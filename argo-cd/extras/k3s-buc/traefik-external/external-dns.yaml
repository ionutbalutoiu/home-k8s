---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: external-buc-balutoiu-com
spec:
  endpoints:
    - dnsName: "*.buc.balutoiu.com"
      recordType: CNAME
      targets:
        - buc.balutoiu.com
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: traefik-buc-balutoiu-com
spec:
  endpoints:
    - dnsName: "traefik.buc.balutoiu.com"
      recordType: A
      targets:
        - 10.130.11.100
