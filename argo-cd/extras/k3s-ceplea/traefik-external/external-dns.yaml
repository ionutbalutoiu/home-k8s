---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: external-balutoiu-com
spec:
  endpoints:
    - dnsName: "balutoiu.com"
      recordType: A
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
      targets:
        # Placeholder only; set the real target directly in the cluster.
        - 127.0.0.1
    - dnsName: "*.balutoiu.com"
      recordType: A
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
      targets:
        # Placeholder only; set the real target directly in the cluster.
        - 127.0.0.1
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: traefik-balutoiu-com
spec:
  endpoints:
    - dnsName: "traefik.balutoiu.com"
      recordType: A
      targets:
        - 10.119.20.20
