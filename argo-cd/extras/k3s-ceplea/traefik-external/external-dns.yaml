---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: external-balutoiu-com
spec:
  endpoints:
    - dnsName: "*.balutoiu.com"
      recordType: CNAME
      targets:
        - balutoiu.com
      providerSpecific:
        - name: cloudflare-proxied
          value: "true"
    - dnsName: "auth.balutoiu.com"
      recordType: CNAME
      targets:
        - balutoiu.com
      providerSpecific:
        - name: cloudflare-proxied
          value: "true"
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: apex-balutoiu-com
spec:
  endpoints:
    - dnsName: "balutoiu.com"
      recordType: A
      targets:
        # Documentation-only placeholder; update this target directly in the cluster.
        - 127.0.0.1
      providerSpecific:
        - name: cloudflare-proxied
          value: "true"
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: traefik-balutoiu-com
spec:
  endpoints:
    - dnsName: "traefik.balutoiu.com"
      recordType: A
      targets:
        - 10.119.20.20
