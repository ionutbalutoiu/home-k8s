---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: external-balutoiu-com
spec:
  endpoints:
    - dnsName: "*.balutoiu.com"
      recordType: CNAME
      targets:
        - balutoiu.com
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "auth.balutoiu.com"
      recordType: CNAME
      targets:
        - balutoiu.com
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: traefik-balutoiu-com
spec:
  endpoints:
    - dnsName: "traefik.balutoiu.com"
      recordType: A
      targets:
        - 10.119.20.20
