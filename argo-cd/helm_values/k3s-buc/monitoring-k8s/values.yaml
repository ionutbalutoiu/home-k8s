cluster:
  name: k3s-buc

destinations:
  prometheus:
    type: prometheus
    url: https://mimir.internal.balutoiu.com/api/v1/push
    extraHeaders:
      X-Scope-OrgID: "k3s-buc"
  loki:
    type: loki
    url: https://loki.internal.balutoiu.com/loki/api/v1/push
    extraHeaders:
      X-Scope-OrgID: "k3s-buc"

clusterMetrics:
  enabled: true
  collector: alloy-singleton
  kubelet:
    metricsTuning:
      useDefaultAllowList: false
      includeMetrics:
        - ".*" # Include all metrics
  kube-state-metrics:
    metricsTuning:
      useDefaultAllowList: false
      includeMetrics:
        - ".*" # Include all metrics
  cadvisor:
    metricsTuning:
      includeMetrics:
        - machine_cpu_cores

telemetryServices:
  node-exporter:
    deploy: true
    resources:
      requests:
        cpu: 2m
        memory: 32Mi
      limits:
        memory: 32Mi
    extraArgs:
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|run/credentials/.+|sys|var/lib/docker/.+|var/lib/containers/storage/.+|var/lib/kubelet/.+)($|/)
  kube-state-metrics:
    deploy: true
    resources:
      requests:
        cpu: 1m
        memory: 50Mi
      limits:
        memory: 50Mi

podLogsViaLoki:
  enabled: true
  collector: alloy-logs

clusterEvents:
  enabled: true
  collector: alloy-singleton

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics

collectors:
  alloy-metrics:
    presets:
      - statefulset
    alloy:
      resources:
        requests:
          cpu: 20m
          memory: 1Gi
        limits:
          memory: 1Gi

  alloy-singleton:
    presets:
      - singleton
    extraConfig: |
      //
      // Mimir rules are saved by default in the "k3s-buc" Mimir tenant
      //
      mimir.rules.kubernetes "default" {
        address                = "https://mimir.internal.balutoiu.com"
        mimir_namespace_prefix = "k3s-buc"
        tenant_id              = "k3s-buc"
      }
    alloy:
      resources:
        requests:
          cpu: 3m
          memory: 256Mi
        limits:
          memory: 256Mi

  alloy-logs:
    presets:
      - filesystem-log-reader
    alloy:
      resources:
        requests:
          cpu: 13m
          memory: 150Mi
        limits:
          memory: 150Mi

alloy-operator:
  resources:
    requests:
      cpu: 30m
      memory: 96Mi
    limits:
      memory: 96Mi
