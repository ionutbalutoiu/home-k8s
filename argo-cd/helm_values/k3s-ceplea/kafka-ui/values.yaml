global:
  alwaysAppendIdentifierToResourceName: true

controllers:
  kafka-ui:
    initContainers:
      init-config:
        image:
          repository: busybox
          pullPolicy: IfNotPresent
          tag: 1.38.0
        command:
          - cp
        args:
          - /config.yaml
          - /etc/kafkaui/dynamic_config.yaml
        resources:
          requests:
            cpu: 1m
            memory: 32Mi
          limits:
            memory: 32Mi
    containers:
      main:
        image:
          repository: docker.io/provectuslabs/kafka-ui
          pullPolicy: IfNotPresent
          tag: v0.7.2
        env:
          DYNAMIC_CONFIG_ENABLED: "true"
        probes:
          readiness:
            enabled: true
            type: HTTP
            path: /actuator/health/readiness
        resources:
          requests:
            cpu: 5m
            memory: 512Mi
          limits:
            memory: 512Mi
        ports:
          - containerPort: 8080
            name: http
            protocol: TCP

service:
  kafka-ui:
    controller: kafka-ui
    primary: true
    ports:
      http:
        port: 8080

route:
  kafka-ui:
    parentRefs:
      - name: traefik-gateway
        namespace: traefik-internal
    hostnames:
      - kafka-ui.internal.balutoiu.com
    rules:
      - name: kafka-ui
        matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: kafka-ui

configMaps:
  config:
    data:
      config.yaml: |
        auth:
          type: DISABLED
        kafka:
          clusters:
          - bootstrapServers: main-kafka-bootstrap.kafka.svc.cluster.local.:9092
            name: main
            properties: {}
            readOnly: false
        rbac:
          roles: []
        webclient: {}

persistence:
  config:
    type: configMap
    identifier: config
    advancedMounts:
      kafka-ui:
        init-config:
          - path: /config.yaml
            readOnly: true
            subPath: config.yaml

  etc:
    type: emptyDir
    globalMounts:
      - path: /etc/kafkaui
