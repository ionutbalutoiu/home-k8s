garage:
  replicationFactor: "3"
  existingRpcSecret: garage-rpc-secret
  s3:
    api:
      region: "garage"
      rootDomain: "-s3.internal.balutoiu.com"
    web:
      rootDomain: ".balutoiu.com"
      index: "index.html"

persistence:
  enabled: true
  meta:
    storageClass: openebs-lvm-pv-thin-xfs
    size: 512Mi
  data:
    storageClass: openebs-lvm-pv-thin-xfs
    size: 40Gi

deployment:
  kind: StatefulSet
  replicaCount: 3
  # Required with the readiness probe: OrderedReady would deadlock a full
  # cold restart (pod-0 needs quorum, but pod-1/pod-2 are never created).
  podManagementPolicy: Parallel

# Keep pods out of the Service until they join the cluster: /health returns
# 503 until the layout is synced and quorum is reachable.
# No livenessProbe on purpose: it would restart all pods on quorum loss.
readinessProbe:
  httpGet:
    path: /health
    port: 3903
  initialDelaySeconds: 5
  periodSeconds: 10

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node_family
              operator: In
              values:
                - beelink-s12-pro

resources:
  requests:
    cpu: 20m
    memory: 512Mi
  limits:
    memory: 512Mi
