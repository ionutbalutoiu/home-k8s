garage:
  replicationFactor: "2"
  existingRpcSecret: garage-rpc-secret
  s3:
    api:
      region: "garage"
      rootDomain: "-s3.internal.balutoiu.com"
    web:
      rootDomain: ".balutoiu.com"
      index: "index.html"

persistence:
  enabled: true
  meta:
    storageClass: openebs-lvm-pv-thin-xfs
    size: 512Mi
  data:
    storageClass: openebs-lvm-pv-thin-xfs
    size: 40Gi

deployment:
  kind: StatefulSet
  replicaCount: 3

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node_family
              operator: In
              values:
                - beelink-s12-pro

resources:
  requests:
    cpu: 20m
    memory: 512Mi
  limits:
    memory: 512Mi
