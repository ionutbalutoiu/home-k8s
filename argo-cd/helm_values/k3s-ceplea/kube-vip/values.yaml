config:
  address: "10.119.10.90"

# Check https://kube-vip.io/docs/installation/flags/
env:
  cp_enable: "true"
  cp_namespace: "kube-system"
  dns_mode: "first"
  lb_enable: "true"
  lb_port: "6443"
  svc_enable: "false"
  vip_interface: "br0"
  vip_leaderelection: "true"
  vip_subnet: "32"

envValueFrom:
  vip_nodename:
    fieldRef:
      fieldPath: spec.nodeName

resources:
  requests:
    cpu: 10m
    memory: 96Mi
  limits:
    memory: 96Mi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/master
              operator: Exists
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
