valkey:
  enabled: true
  global:
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
  persistence:
    data:
      size: 1Gi
      type: persistentVolumeClaim
      storageClass: longhorn-2r
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 32Mi

immich:
  persistence:
    library:
      existingClaim: pvc-immich

server:
  defaultPodOptions:
    affinity: &affinity
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - hyper-ryzen
                    - beelink-s12-pro-01
                    - beelink-s12-pro-02
                    - beelink-s12-pro-03
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - hyper-ryzen
          - weight: 90
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - beelink-s12-pro-01
                    - beelink-s12-pro-02
                    - beelink-s12-pro-03
  controllers:
    main:
      strategy: Recreate
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            tag: v3.0.1
          env: &database_env
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: dbname
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: username
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: password
            DB_HOSTNAME: immich-postgres-rw.immich.svc
          resources:
            requests:
              cpu: 100m
              memory: 6Gi
            limits:
              cpu: 4000m
              memory: 6Gi
  route:
    main:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik-external
      hostnames:
        - immich.balutoiu.com
      rules:
        - name: server
          matches:
            - path:
                type: PathPrefix
                value: /
          filters:
            - type: ExtensionRef
              extensionRef:
                group: traefik.io
                kind: Middleware
                name: security-headers
          backendRefs:
            - identifier: main

machine-learning:
  defaultPodOptions:
    affinity: *affinity
  controllers:
    main:
      containers:
        main:
          env: *database_env
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            tag: v3.0.1
          resources:
            requests:
              cpu: 50m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 2Gi
