apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-external
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: traefik
      repoURL: https://helm.traefik.io/traefik
      targetRevision: 41.0.2
      helm:
        skipCrds: true
        valueFiles:
          - $values/argo-cd/helm_values/k3s-ceplea/traefik-external/values.yaml
    - repoURL: https://github.com/ionutbalutoiu/home-k8s.git
      targetRevision: HEAD
      ref: values
    - path: argo-cd/extras/k3s-ceplea/traefik-external
      repoURL: https://github.com/ionutbalutoiu/home-k8s.git
      targetRevision: HEAD
      directory:
        recurse: true
  destination:
    namespace: traefik-external
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: externaldns.k8s.io
      kind: DNSEndpoint
      name: external-apex-balutoiu-com
      jsonPointers:
        - /spec/endpoints/0/targets
    - group: externaldns.k8s.io
      kind: DNSEndpoint
      name: external-wildcard-balutoiu-com
      jsonPointers:
        - /spec/endpoints/0/targets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
